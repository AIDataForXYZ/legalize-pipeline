name: Bootstrap country

on:
  workflow_dispatch:
    inputs:
      country:
        description: "Country code (es, fr, se)"
        required: true
        type: string
        default: "es"
      repo_path:
        description: "Output repo path (e.g., ../countries/es)"
        required: false
        type: string
      dry_run:
        description: "Simulate without creating commits"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1
        id: app-token
        with:
          app-id: ${{ secrets.LEGALIZE_APP_ID }}
          private-key: ${{ secrets.LEGALIZE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: legalize-dev/legalize-${{ inputs.country }}
          path: repos/${{ inputs.country }}
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e .

      - name: Run bootstrap
        env:
          INPUT_COUNTRY: ${{ inputs.country }}
          INPUT_DRY_RUN: ${{ inputs.dry_run }}
        run: |
          ARGS="-c $INPUT_COUNTRY"
          ARGS="$ARGS --repo-path repos/$INPUT_COUNTRY"
          if [ "$INPUT_DRY_RUN" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          legalize bootstrap $ARGS

      - name: Push to output repo
        if: ${{ !inputs.dry_run }}
        env:
          INPUT_COUNTRY: ${{ inputs.country }}
        run: |
          cd "repos/$INPUT_COUNTRY"
          git push origin HEAD
